spring:
  application:
    name: ai-text-summariser

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  datasource:
    url: jdbc:mysql://localhost:3306/ai_summarizer
    username: appuser
    password: apppass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  ai:
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: never
      chat:
        options:
          model: mistral
          temperature: 0.7

server:
  port: 8080
  tomcat:
    max-http-request-header-size: 65536

app:
  ai:
    max-input-length: 10000
    available-models: mistral,llama3.1,qwen
    default-model: mistral
  document:
    upload-dir: uploads
